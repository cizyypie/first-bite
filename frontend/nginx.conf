server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files directly; fall back to 404 for anything missing
    # (this is a plain multi-page site, not an SPA, so no rewrite to index.html)
    location / {
        try_files $uri $uri/ =404;
    }
}
