<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First Bite - Cart</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="index.html" class="nav-brand">First Bite</a>
      <div class="nav-links">
        <a href="index.html">Menu</a>
        <a href="cart.html" class="cart-link">Cart <span id="cart-badge">0</span></a>
        <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
        <a href="login.html" id="login-link">Login</a>
        <a href="#" id="logout-link" style="display:none;" onclick="logout()">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1>Your Cart</h1>

    <p id="cart-empty" style="display:none;" class="empty">Your cart is empty. Browse the <a href="index.html">menu</a> to add items.</p>

    <div id="cart-items"></div>

    <div class="cart-total">Total: Rp <span id="cart-total">0</span></div>

    <form id="checkout-form" style="display:none;" onsubmit="handleCheckout(event)">
      <div id="guest-fields">
        <div class="form-group">
          <label for="customer-name">Your Name</label>
          <input type="text" id="customer-name" placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="customer-email">Email</label>
          <input type="email" id="customer-email" placeholder="you@email.com">
        </div>
      </div>

      <div class="form-group">
        <label for="table-number">Table Number</label>
        <input type="text" id="table-number" placeholder="e.g. A5" required>
      </div>

      <button type="submit" class="btn-primary">Place Order</button>

      <p id="checkout-error" class="error"></p>
      <p id="checkout-success" class="success"></p>
    </form>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/order.js"></script>
  <script>
    updateAuthUI();
    updateCartBadge();
    renderCart();
  </script>
</body>
</html>
